name: My Workflow

on: 
  push:
    branches: [main]
    # paths-ignore:
    #   - '.github/workflows/*'
    pull_request:
      branches: [main]
    repository_dispatch:
      types: on-demand-test

jobs:
  echo-vars:
    runs-on: ubuntu-latest
    steps:
       - name: Echo variables
         env:
           RUNNER_CONTEXT: ${{ toJson(runner) }}
         run: |
           echo "Runner Context: $RUNNER_CONTEXT"
           echo "Repository: ${{ github.repository }}"
           echo "Event Name: ${{ github.event_name }}"
           echo "Workflow: ${{ github.workflow }}"
           echo "Actor: ${{ github.actor }}"
           echo "Ref: ${{ github.ref }}"
           echo "SHA: ${{ github.sha }}"
           echo "The Database password is ${{ secrets.DB_PASSWORD }}"
  myJob:
    if: ${{ github.event_name != 'repository_dispatch' || github.event.client_payload.status == 'completed'}}
    runs-on: ubuntu-latest
    steps:
       - name: Run a one-line script
         run: echo Hello, world

       - name: Retrieve client payload
         env:
          PAYLOAD_STATUS: ${{ github.event.client_payload.status }}
         run: echo "Client payload $PAYLOAD_STATUS"
  secondJob:
    if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.status == 'completed'}}
    runs-on: windows-latest
    needs: myJob
    steps:
       - name: Run a multi-line script
         run: |
           echo Add other actions to build ${{ runner.os }} project.,
           echo test, and deploy your project.
         if: ${{ runner.os == 'linux' }}
 
